<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cubicajes</title><style>body{font-family:Arial;margin:0;background:#f3f5f7;color:#18212f}header{background:#1f2937;color:white;padding:22px}main{max-width:1100px;margin:auto;padding:16px}.card{background:white;border:1px solid #d8dee8;border-radius:14px;padding:14px;margin:10px 0;box-shadow:0 2px 7px #0001}.grid{display:grid;gap:10px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.g5{grid-template-columns:repeat(5,1fr)}label{font-size:12px;font-weight:bold;display:block;margin-bottom:4px}input,select{width:100%;padding:8px;border:1px solid #ccd3dd;border-radius:9px}button{background:#1f2937;color:white;border:0;border-radius:9px;padding:9px 12px;font-weight:bold;cursor:pointer}button.sec{background:white;color:#1f2937;border:1px solid #ccd3dd}button.red{background:#b42318}.row{display:flex;justify-content:space-between;border:1px solid #dde3ec;border-radius:10px;padding:8px;margin:6px 0}.metric{font-size:24px;font-weight:800}.muted{color:#667085;font-size:13px}.badge{display:inline-block;background:#eef2f7;padding:4px 8px;border-radius:999px;font-size:12px;font-weight:bold;margin-right:4px}.bar{height:11px;background:#dbe3ee;border-radius:999px;overflow:hidden}.bar div{height:100%;background:#1f2937}.tabs button{margin:4px}.tab{display:none}.tab.on{display:block}@media(max-width:850px){.g2,.g3,.g4,.g5{grid-template-columns:1fr}}</style></head><body><header><h1>App de Cubicajes - Silos y Cereal</h1><p>Archivo único: abrir con Chrome/Edge. No necesita instalación.</p></header><main><div class="card"><h2>Datos generales</h2><div class="grid g4"><div><label>Planta</label><input id="planta" value="Planta de acopio" oninput="saveRender()"></div><div><label>Responsable</label><input id="resp" oninput="saveRender()"></div><div><label>Unidad</label><select id="unidad" onchange="saveRender()"><option value="m">Metros</option><option value="cm">Centímetros</option><option value="mm">Milímetros</option></select></div><div><label>Cereal base</label><select id="cerealBase" onchange="cambiarCereal()"></select></div></div><div class="grid g4"><div><label>Densidad base kg/m³</label><input id="densidadBase" type="number" value="720" oninput="saveRender()"></div><div><label>Fecha</label><input id="fecha" type="date" oninput="saveRender()"></div></div><p><button onclick="add('silo')">+ Silo</button> <button onclick="add('celda')">+ Celda</button> <button class="sec" onclick="csv()">Exportar CSV</button> <button class="sec" onclick="json()">Exportar JSON</button> <button class="sec" onclick="window.print()">Imprimir</button> <button class="red" onclick="borrar()">Borrar guardado</button></p><p class="muted">En silos: cargá chapas totales y chapas ocupadas. La altura ocupada se calcula sola.</p></div><div class="tabs"><button onclick="tab('planta')">Planta</button><button onclick="tab('silo')">Calculadora silo</button><button onclick="tab('celda')">Calculadora celda</button></div><section id="planta" class="tab on"><div id="metrics" class="grid g5"></div><div class="grid g2"><div class="card"><h2>Estructuras</h2><div id="lista"></div></div><div class="card"><h2>Resumen</h2><div id="resumen"></div></div></div></section><section id="silo" class="tab"><div class="grid g2"><div class="card"><h2>Calculadora silo</h2><div class="grid g3"><div><label>Diámetro</label><input id="sd" type="number" value="12" oninput="calcInd()"></div><div><label>Altura cuerpo</label><input id="sh" type="number" value="18" oninput="calcInd()"></div><div><label>Chapas totales</label><input id="sct" type="number" value="10" oninput="calcInd()"></div><div><label>Chapas ocupadas</label><input id="sco" type="number" value="7" oninput="calcInd()"></div><div><label>Copete</label><input id="scp" type="number" value="0" oninput="calcInd()"></div><div><label>Tolva</label><input id="stv" type="number" value="0" oninput="calcInd()"></div></div></div><div class="card"><h2>Resultado</h2><div id="sres"></div></div></div></section><section id="celda" class="tab"><div class="grid g2"><div class="card"><h2>Calculadora celda</h2><div class="grid g4"><div><label>Largo</label><input id="cl" type="number" value="20" oninput="calcInd()"></div><div><label>Ancho</label><input id="ca" type="number" value="8" oninput="calcInd()"></div><div><label>Altura total</label><input id="cht" type="number" value="6" oninput="calcInd()"></div><div><label>Altura grano</label><input id="chg" type="number" value="4" oninput="calcInd()"></div></div></div><div class="card"><h2>Resultado</h2><div id="cres"></div></div></div></section></main><script>const CER={trigo:['Trigo',780],maiz:['Maíz',720],soja:['Soja',750],girasol:['Girasol',420],sorgo:['Sorgo',745],cebada:['Cebada',620]},EST={operativo:'Operativo',completo:'Completo',disponible:'Disponible',limpieza:'Limpieza',bloqueado:'Bloqueado'};let E=[];const KEY='cub_simple_v1';function n(v){let x=parseFloat(String(v).replace(',','.'));return isFinite(x)?x:0}function r(v,d=2){return isFinite(v)?Number(v.toFixed(d)):0}function f(){let u=unidad.value;return u=='cm'?.01:u=='mm'?.001:1}function dens(){return n(densidadBase.value)||720}function hCh(e){return n(e.ct)>0?n(e.h)*Math.min(n(e.co),n(e.ct))/n(e.ct):n(e.hg||0)}function silo(e){let F=f(),de=n(e.den)||dens(),d=n(e.d)*F,h=n(e.h)*F,hg=Math.min(hCh(e)*F,h),cp=n(e.cp)*F,tv=n(e.tv)*F,base=Math.PI*(d/2)**2,cap=base*h+base*cp/3+base*tv/3,ocu=base*hg+(hg>0?base*tv/3:0)+(hg>=h?base*cp/3:0);ocu=Math.min(ocu,cap);return{cap:r(cap),ocu:r(ocu),disp:r(cap-ocu),tn:r(ocu*de/1000),pct:r(cap?ocu/cap*100:0,1),hcalc:r(hCh(e),3),cl:r(Math.max(0,n(e.ct)-n(e.co)),2)}}function celda(e){let F=f(),de=n(e.den)||dens(),cap=n(e.l)*F*n(e.a)*F*n(e.h)*F,ocu=n(e.l)*F*n(e.a)*F*Math.min(n(e.hg)*F,n(e.h)*F);return{cap:r(cap),ocu:r(ocu),disp:r(cap-ocu),tn:r(ocu*de/1000),pct:r(cap?ocu/cap*100:0,1)}}function nuevo(t,c=cerealBase.value){let den=CER[c][1],id=Date.now()+Math.random();return t=='silo'?{id,t,nombre:'Silo '+(E.length+1),c,den,est:'operativo',d:12,h:18,ct:10,co:7,cp:0,tv:0,obs:''}:{id,t,nombre:'Celda '+(E.length+1),c,den,est:'operativo',l:20,a:8,h:6,hg:4,obs:''}}function init(){cerealBase.innerHTML=Object.entries(CER).map(([k,v])=>`<option value="${k}">${v[0]}</option>`).join('');fecha.value=new Date().toISOString().slice(0,10);let s=localStorage.getItem(KEY);if(s){let o=JSON.parse(s);E=o.E||[];planta.value=o.planta||planta.value;resp.value=o.resp||'';unidad.value=o.unidad||'m';cerealBase.value=o.cerealBase||'maiz';densidadBase.value=o.densidadBase||720;fecha.value=o.fecha||fecha.value}else{E=[{...nuevo('silo','maiz'),nombre:'Silo 1',d:14,h:20,ct:12,co:9,cp:1.2,tv:1.5},{...nuevo('silo','soja'),nombre:'Silo 2',d:10,h:16,ct:10,co:5.5,tv:1},{...nuevo('celda','trigo'),nombre:'Celda A',l:24,a:10,h:7,hg:5.2}]}render()}function save(){localStorage.setItem(KEY,JSON.stringify({E,planta:planta.value,resp:resp.value,unidad:unidad.value,cerealBase:cerealBase.value,densidadBase:densidadBase.value,fecha:fecha.value}))}function saveRender(){save();render()}function cambiarCereal(){densidadBase.value=CER[cerealBase.value][1];saveRender()}function add(t){E.push(nuevo(t));saveRender()}function del(id){E=E.filter(x=>x.id!=id);saveRender()}function upd(id,k,v){E=E.map(e=>{if(e.id!=id)return e;let z={...e,[k]:v};if(k=='c')z.den=CER[v][1];if(k=='t')z={...nuevo(v,e.c),id:e.id,nombre:e.nombre,c:e.c,den:e.den,est:e.est,obs:e.obs};return z});saveRender()}function datos(){return E.map(e=>({...e,res:e.t=='silo'?silo(e):celda(e)}))}function render(){let D=datos(),cap=0,ocu=0,tn=0,pc={};D.forEach(e=>{cap+=e.res.cap;ocu+=e.res.ocu;tn+=e.res.tn;pc[e.c]=(pc[e.c]||0)+e.res.tn});metrics.innerHTML=`<div class=card><p class=muted>Estructuras</p><div class=metric>${D.length}</div></div><div class=card><p class=muted>Capacidad</p><div class=metric>${r(cap)} m³</div></div><div class=card><p class=muted>Ocupado</p><div class=metric>${r(ocu)} m³</div></div><div class=card><p class=muted>Disponible</p><div class=metric>${r(cap-ocu)} m³</div></div><div class=card><p class=muted>Toneladas</p><div class=metric>${r(tn)} tn</div>${bar(cap?ocu/cap*100:0)}</div>`;lista.innerHTML=D.map(htmlE).join('');resumen.innerHTML=Object.entries(pc).map(([k,v])=>`<div class=card><b>${CER[k][0]}</b><p>${r(v)} tn</p></div>`).join('');calcInd()}function row(a,b,u){return`<div class=row><span>${a}</span><b>${b} ${u}</b></div>`}function bar(p){return`<div class=bar><div style="width:${Math.max(0,Math.min(100,p))}%"></div></div><p class=muted>${r(p,1)}%</p>`}function htmlE(e){let opts=Object.entries(CER).map(([k,v])=>`<option value=${k} ${e.c==k?'selected':''}>${v[0]}</option>`).join(''),ests=Object.entries(EST).map(([k,v])=>`<option value=${k} ${e.est==k?'selected':''}>${v}</option>`).join(''),res=e.res,cam=e.t=='silo'?`<div class="grid g5"><div><label>Diámetro</label><input value="${e.d}" onchange="upd('${e.id}','d',this.value)"></div><div><label>Altura cuerpo</label><input value="${e.h}" onchange="upd('${e.id}','h',this.value)"></div><div><label>Chapas totales</label><input value="${e.ct}" onchange="upd('${e.id}','ct',this.value)"></div><div><label>Chapas ocupadas</label><input value="${e.co}" onchange="upd('${e.id}','co',this.value)"></div><div><label>Chapas libres</label><input value="${res.cl}" readonly></div><div><label>Altura calc.</label><input value="${res.hcalc}" readonly></div><div><label>Copete</label><input value="${e.cp||0}" onchange="upd('${e.id}','cp',this.value)"></div><div><label>Tolva</label><input value="${e.tv||0}" onchange="upd('${e.id}','tv',this.value)"></div></div>`:`<div class="grid g4"><div><label>Largo</label><input value="${e.l}" onchange="upd('${e.id}','l',this.value)"></div><div><label>Ancho</label><input value="${e.a}" onchange="upd('${e.id}','a',this.value)"></div><div><label>Altura total</label><input value="${e.h}" onchange="upd('${e.id}','h',this.value)"></div><div><label>Altura grano</label><input value="${e.hg}" onchange="upd('${e.id}','hg',this.value)"></div></div>`;return`<div class="card structure"><p><span class=badge>${e.t=='silo'?'Silo':'Celda'}</span><span class="badge blue">${e.t=='silo'?(e.co+'/'+e.ct+' chapas'):''}</span><button class=red style="float:right" onclick="del('${e.id}')">Eliminar</button></p><div class="grid g4"><div><label>Nombre</label><input value="${e.nombre}" onchange="upd('${e.id}','nombre',this.value)"></div><div><label>Tipo</label><select onchange="upd('${e.id}','t',this.value)"><option value=silo ${e.t=='silo'?'selected':''}>Silo</option><option value=celda ${e.t=='celda'?'selected':''}>Celda</option></select></div><div><label>Cereal</label><select onchange="upd('${e.id}','c',this.value)">${opts}</select></div><div><label>Estado</label><select onchange="upd('${e.id}','est',this.value)">${ests}</select></div></div><div class="grid g3"><div><label>Densidad</label><input value="${e.den}" onchange="upd('${e.id}','den',this.value)"></div><div><label>Obs.</label><input value="${e.obs||''}" onchange="upd('${e.id}','obs',this.value)"></div></div>${cam}<div class="grid g2"><div>${row('Capacidad',res.cap,'m³')}${row('Ocupado',res.ocu,'m³')}${row('Disponible',res.disp,'m³')}</div><div>${row('Toneladas',res.tn,'tn')}${row('Ocupación',res.pct,'%')}${bar(res.pct)}</div></div></div>`}function calcInd(){let ss=silo({d:sd.value,h:sh.value,ct:sct.value,co:sco.value,cp:scp.value,tv:stv.value,den:dens()});calcSiloChapasLibres.value=ss.cl;sres.innerHTML=row('Capacidad',ss.cap,'m³')+row('Ocupado',ss.ocu,'m³')+row('Toneladas',ss.tn,'tn')+row('Altura grano',ss.hcalc,unidad.value)+row('Chapas libres',ss.cl,'chapas')+bar(ss.pct);let cc=celda({l:cl.value,a:ca.value,h:cht.value,hg:chg.value,den:dens()});cres.innerHTML=row('Capacidad',cc.cap,'m³')+row('Ocupado',cc.ocu,'m³')+row('Toneladas',cc.tn,'tn')+bar(cc.pct)}function tab(id){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));document.getElementById(id).classList.add('on')}function csv(){let D=datos(),head=['Planta','Responsable','Fecha','Nombre','Tipo','Cereal','Estado','Densidad','Chapas totales','Chapas ocupadas','Chapas libres','Altura calc','Capacidad','Ocupado','Disponible','Toneladas','Ocupacion'],rows=D.map(e=>[planta.value,resp.value,fecha.value,e.nombre,e.t,CER[e.c][0],EST[e.est],e.den,e.ct||'',e.co||'',e.res.cl||'',e.res.hcalc||'',e.res.cap,e.res.ocu,e.res.disp,e.res.tn,e.res.pct]);down('cubicajes.csv',[head,...rows].map(x=>x.map(v=>`"${String(v).replaceAll('"','""')}"`).join(';')).join('\n'),'text/csv')}function json(){down('cubicajes.json',JSON.stringify({planta:planta.value,responsable:resp.value,fecha:fecha.value,estructuras:datos()},null,2),'application/json')}function down(name,txt,type){let b=new Blob([txt],{type}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u)}function borrar(){localStorage.removeItem(KEY);location.reload()}init();</script></body></html>
