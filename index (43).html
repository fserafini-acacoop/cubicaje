<title>Cubicaje App</title>
</head>
<body>
<script>
(function(){
 var APP_VER='1.0';
 var stored=localStorage.getItem('cubicaje_app_version');
 if(stored && stored!==APP_VER){
  localStorage.setItem('cubicaje_app_version',APP_VER);
  console.log('App actualizada a v'+APP_VER);
 }else if(!stored){
  localStorage.setItem('cubicaje_app_version',APP_VER);
 }
})();
</script>
<style>
:root{--bg:#f5f3ee;--surface:#fff;--primary:#2d5016;--primaryL:#e8f0e4;--accent:#c8982a;--accentL:#fefbf0;--text:#1a1a1a;--textS:#666;--border:#e0ddd6;--danger:#c62828;--dangerBg:#fce8e8;--success:#2e7d32;--successBg:#e8f5e9;--r:10px;--sh:0 1px 4px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body,html{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;color:var(--text);background:var(--bg)}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:30px}
.hdr{background:var(--primary);color:#fff;padding:12px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100}
.hdr h1{font-size:16px;font-weight:700;flex:1;margin:0}
.hdr-sub{font-size:11px;opacity:.8}
.hbtn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:7px;padding:6px 11px;font-size:13px;cursor:pointer}
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);margin:8px 12px;padding:12px;box-shadow:var(--sh)}
.card-accent{background:var(--accentL);border-color:var(--accent)}
.card-green{background:var(--primaryL);border-color:var(--primary)}
.card-dark{background:var(--primary);color:#fff;border:none}
.lbl{font-size:11px;font-weight:700;color:var(--textS);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;display:block}
input[type=text],input[type=number],select{width:100%;padding:9px 10px;border-radius:7px;border:1px solid var(--border);font-size:15px;background:#fafaf8;-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
select{padding-right:24px}
.btn{background:var(--primary);color:#fff;border:none;border-radius:8px;padding:11px 18px;font-size:15px;font-weight:600;cursor:pointer;width:100%;text-align:center;display:block}
.btn-sm{padding:7px 12px;font-size:13px;width:auto;display:inline-block}
.btn-out{background:transparent;color:var(--primary);border:1.5px solid var(--primary);border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;width:100%;text-align:left}
.btn-x{background:transparent;color:var(--danger);border:1px solid var(--danger);border-radius:5px;padding:4px 8px;font-size:11px;cursor:pointer}
.row{display:flex;gap:8px;align-items:center}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.tabs{display:flex;overflow-x:auto;gap:0;background:var(--surface);border-bottom:1px solid var(--border);padding:0 6px}
.tabs button{padding:9px 12px;font-size:12px;font-weight:500;color:var(--textS);border:none;border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;background:none}
.tabs button.act{color:var(--primary);font-weight:700;border-bottom-color:var(--primary)}
.cono-bar{display:flex;gap:3px}
.cono-btn{flex:1;padding:7px 2px;border-radius:7px;font-size:16px;border:1px solid var(--border);background:#fff;cursor:pointer;text-align:center;line-height:1}
.cono-btn.act{border:2px solid var(--primary);background:var(--primaryL)}
.cono-btn small{display:block;font-size:8px;color:var(--textS);margin-top:2px}
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;color:#fff;vertical-align:middle;margin-left:4px}
.empty{text-align:center;padding:36px 20px;color:var(--textS)}
.diff-pos{color:var(--success);font-weight:700}
.diff-neg{color:var(--danger);font-weight:700}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:4px;text-align:right}
th:first-child,td:first-child{text-align:left}
thead tr{border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border)}
.silo-hdr{cursor:pointer;display:flex;align-items:center;gap:6px}
.silo-body{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.sec-title{padding:8px 14px 2px;font-size:11px;font-weight:700;color:var(--textS);text-transform:uppercase;letter-spacing:.5px}

/* ===== CALCULATIONS ===== */
function calcCil(silo,e,pe){
 if(!e||!e.grano||e.grano==='VACIO')return{m3:0,kg:0};
 const r=silo.diametro/2,a=Math.PI*r*r;
 const pctCono=(e.pctCono!=null?e.pctCono:100)/100;
 const vc=(1/3)*a*(silo.profCono||0)*pctCono;
 const pctFalda=(e.pctFalda!=null?e.pctFalda:100)/100;
 const vfalda=a*(silo.falda||0)*pctFalda;
 const vcil=(e.chapasLlenas||0)*silo.altChapa*a;
 const vs=(e.cono||0)*(1/3)*a*(silo.altConoSup||0);
 const m3=Math.max(0,vc+vfalda+vcil+vs);
 return{m3,kg:m3*(pe||0)};
}
function calcSB(e,kgm){
 if(!e||!e.grano||!e.metros)return{kg:0};
 return{kg:e.metros*(kgm||0)};
}
function calcCelda(c,e,pe,peTrigo){
 if(!e||!e.grano||e.grano==='VACIO')return{kg:0,capTn:c.capacidad||0};
 const capTn=c.capacidad||0;
 if(e.tnDirecto)return{kg:e.tnDirecto*1000,capTn};
 const met=e.metodo||'capacidad';
 if(met==='capacidad'&&capTn){
 const factor=(pe||0)/(peTrigo||800);
 const capGrano=capTn*factor;
 return{kg:capGrano*((e.pctLleno||0)/100)*1000,capTn,capGranoTn:capGrano};
 }
 if(met==='medidas'){
 const L=e.largoLocal||c.largo||0,W=e.anchoLocal||c.ancho||0;
 const altG=e.altGrano||0;
 const profC=c.profConoCelda||0;
 const altLomo=e.altLomo||0;
 const altDep=e.altDepresion||0;
 const vRect=L*W*altG;
 const vCono=(altG>0||profC>0)?(1/3)*L*W*profC:0;
 const vLomo=altLomo>0?(1/3)*L*W*altLomo:0;
 const vDep=altDep>0?(1/3)*L*W*altDep:0;
 const volLomoExtra=c.volLomo?(c.volLomo*((e.pctLomo!=null?e.pctLomo:0)/100)):0;
 return{kg:(vRect+vCono+vLomo-vDep+volLomoExtra)*(pe||0),capTn};
 }
 return{kg:0,capTn};
}
function calcOtro(e){return{kg:((e&&e.tnDirecto)||0)*1000};}

const hasClaudeStorage=typeof window.storage!=='undefined'&&window.storage?.get;
async function sGet(k,fb){
 try{
 if(hasClaudeStorage){const r=await window.storage.get(k);return r?JSON.parse(r.value):fb;}
 const v=localStorage.getItem('cb_'+k);return v?JSON.parse(v):fb;
 }catch{return fb}
}
async function sSet(k,v){
 try{
 if(hasClaudeStorage){await window.storage.set(k,JSON.stringify(v));}
 else{localStorage.setItem('cb_'+k,JSON.stringify(v));}
 }catch(e){console.error(e)}
}
async function sDel(k){
 try{
 if(hasClaudeStorage){await window.storage.delete(k);}
 else{localStorage.removeItem('cb_'+k);}
 }catch{}
}

/* ===== TOTALS CALCULATION ===== */
function calcPlantTotals(plantas,data,config){
 const t={};
 (plantas||[]).forEach(p=>{
 const bg={};
 (p.silos||[]).forEach(s=>{
 if(s.tipo==='cilindrico'||!s.tipo){
 const e=data.entries?.[s.id];
 if(e?.grano&&e.grano!=='VACIO'){const pe=e.peLocal||getPE(e.grano,data,config);const{kg}=calcCil(s,e,pe);bg[e.grano]=(bg[e.grano]||0)+kg;}
 }else if(s.tipo==='celda'){
 const e=data.celdaEntries?.[s.id];
 if(e?.grano&&e.grano!=='VACIO'){const pe=e.peLocal||getPE(e.grano,data,config);const peT=getPE('TRIGO',data,config);const{kg}=calcCelda(s,e,pe,peT);bg[e.grano]=(bg[e.grano]||0)+kg;}
 }else if(s.tipo==='silobolsa'){
 const e=data.entries?.[s.id];
 if(e?.grano&&e?.metros){const kgm=getKGM(e.grano,data,config);const{kg}=calcSB(e,kgm);bg[e.grano]=(bg[e.grano]||0)+kg;}
 }else if(s.tipo==='otro'){
 const e=data.entries?.[s.id];
 if(e?.grano&&e.grano!=='VACIO'&&e?.tnDirecto){bg[e.grano]=(bg[e.grano]||0)+e.tnDirecto*1000;}
 }
 });
 (data.silobolsas?.[p.id]||[]).forEach(sb=>{
 if(sb?.grano&&sb?.metros){const kgm=sb.kgmLocal||getKGM(sb.grano,data,config);const{kg}=calcSB(sb,kgm);bg[sb.grano]=(bg[sb.grano]||0)+kg;}
 });
 (data.otrosExtra?.[p.id]||[]).forEach(ot=>{
 if(ot?.grano&&ot.grano!=='VACIO'&&ot?.tnDirecto){bg[ot.grano]=(bg[ot.grano]||0)+ot.tnDirecto*1000;}
 });
 t[p.id]={byGrano:bg,libros:data.libros?.[p.id]||{},arca:data.arca?.[p.id]||{}};
 });
 return t;
}

window.pegarTexto=async(tipo)=>{
 try{
  const text=await navigator.clipboard.readText();
  if(!text){alert('No hay texto en el portapapeles. Abr\u00ed el .txt en WhatsApp, seleccion\u00e1 todo, copi\u00e1, y volv\u00e9 ac\u00e1.');return;}
  const data=JSON.parse(text);
  if(tipo==='cubicaje')importarDesdeData(data,'cubicaje');
  else if(tipo==='merge')importarDesdeData(data,'merge');
  else if(tipo==='config')importarConfigDesdeData(data);
  else if(tipo==='backup')restaurarDesdeData(data);
 }catch(e){
  if(e.name==='NotAllowedError'){
   const text=prompt('Peg\u00e1 el contenido del archivo ac\u00e1 (abr\u00ed el .txt, seleccion\u00e1 todo, copi\u00e1):');
   if(!text)return;
   try{const data=JSON.parse(text);
    if(tipo==='cubicaje')importarDesdeData(data,'cubicaje');
    else if(tipo==='merge')importarDesdeData(data,'merge');
    else if(tipo==='config')importarConfigDesdeData(data);
    else if(tipo==='backup')restaurarDesdeData(data);
   }catch(e2){alert('El texto pegado no es v\u00e1lido. Asegurate de copiar todo el contenido del archivo.');}
  }else{alert('Error: '+e.message+'. Prob\u00e1 abrir el .txt, seleccionar todo, copiar, y pegar ac\u00e1.');}
 }
};
function shareOrDownload(blob, filename, title){
 const file=new File([blob],filename,{type:blob.type});
 if(navigator.canShare&&navigator.canShare({files:[file]})){
  navigator.share({files:[file],title:title||'Cubicaje'}).catch(()=>{fallbackDownload(blob,filename);});
 }else{fallbackDownload(blob,filename);}
}
function fallbackDownload(blob,filename){
 const a=document.createElement('a');a.href=URL.createObjectURL(blob);
 a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);
 alert('Archivo guardado en la carpeta DESCARGAS del celular.\n\nPara encontrarlo: abr\u00ed la app Archivos > Descargas > '+filename);
}

function renderPEOverride(data){
 let h='';
 const ov=data.peOverride||{};
 h+=`<div class="card card-accent"><span class="lbl" style="color:var(--accent)"> Peso Hectol&iacute;trico para este cubicaje</span>`;
 h+=`<div style="font-size:12px;color:var(--textS);margin-bottom:8px">Si el grano tiene calidad diferente a lo est&aacute;ndar, ajust&aacute; el PE ac&aacute;. Solo afecta a este cubicaje. Si lo dej&aacute;s vac&iacute;o, usa el valor por defecto de la configuraci&oacute;n.</div>`;
 getAllGranoKeys(S.config).forEach(g=>{
 const def=getPE(g,{},S.config);
 const rng=PE_RANGOS[g]||[0,1000];
 const v=ov[g]||'';
 h+=`<div class="row mb6"><span style="width:70px;font-size:13px;font-weight:700">${g}</span><input type="number" inputmode="decimal" value="${v}" onchange="setPEOverride('${g}',this.value?Number(this.value):null)" placeholder="${def}" style="flex:1" min="${rng[0]}" max="${rng[1]}"><span style="font-size:10px;color:var(--textS);width:85px;text-align:right">defecto: ${def}</span></div>`;
 });
 h+=`<button class="btn-out mt8" onclick="clearPEOverride()" style="text-align:center;font-size:12px">Limpiar ajustes (usar valores por defecto)</button>`;
 h+=`</div>`;

 // Show effective PE summary
 h+=`<div class="card card-green"><span class="lbl" style="color:var(--primary)">PH efectivo en este cubicaje</span>`;
 h+=`<table><thead><tr><th>Cereal</th><th>PH (kg/m&#179;)</th><th>Origen</th></tr></thead><tbody>`;
 getAllGranoKeys(S.config).forEach(g=>{
 const ovVal=ov[g];
 const cfVal=S.config.peConfig?.[g];
 const eff=getPE(g,data,S.config);
 const origen=ovVal?'<b style="color:var(--accent)">Ajuste cubicaje</b>':cfVal&&cfVal!==PE_DEFAULTS[g]?'Config personalizado':'Por defecto';
 h+=`<tr><td style="font-weight:600">${g}</td><td>${eff}</td><td style="font-size:11px">${origen}</td></tr>`;

 h+=`</tbody></table></div>`;

 // KGM override for this cubicaje
 const ovk=data.kgmOverride||{};
 h+=`<div class="card" style="background:#f0f4ff;border-color:#7b8fba"><span class="lbl" style="color:#4a5d8a"> Silobolsa: kg/m para este cubicaje</span>`;
 h+=`<div style="font-size:12px;color:var(--textS);margin-bottom:8px">Si los silobolsas est&aacute;n m&aacute;s o menos llenos de lo normal, ajust&aacute; el kg por metro ac&aacute;.</div>`;
 getAllGranoKeys(S.config).forEach(g=>{
 const def=getKGM(g,{},S.config);
 const v=ovk[g]||'';
 h+=`<div class="row mb6"><span style="width:70px;font-size:13px;font-weight:700">${g}</span><input type="number" inputmode="decimal" value="${v}" onchange="setKGMOverride('${g}',this.value?Number(this.value):null)" placeholder="${def}" style="flex:1"><span style="font-size:10px;color:var(--textS);width:85px;text-align:right">defecto: ${def}</span></div>`;
 });
 h+=`<button class="btn-out mt8" onclick="clearKGMOverride()" style="text-align:center;font-size:12px">Limpiar ajustes</button>`;
 h+=`</div>`;

 return h;
}

 cilin.forEach(silo=>{

 if(open){

 });

 // Celdas
 if(celdas.length)h+=`<div class="sec-title">Celdas</div>`;
 celdas.forEach(c=>{
 const e=data.celdaEntries?.[c.id]||{};
 const peBase=getPE(e.grano,data,S.config);
 const pe=e.peLocal||peBase;
 const peT=getPE('TRIGO',data,S.config);
 const r=calcCelda(c,e,pe,peT);

 if(open){

 if(met==='capacidad'&&hasCap){

 h+=`<div class="card" style="border-left:4px solid var(--primary)"><span class="lbl" style="color:var(--primary)">Resumen ${pl.nombre}</span><div style="overflow-x:auto"><table style="min-width:400px"><thead><tr><th>Cereal</th><th>Cub.</th>${hasL?'<th>Libros</th>':''}${hasA?'<th>ARCA</th>':''}${hasL?'<th>C vs L</th>':''}${hasA?'<th>C vs A</th>':''}${hasL&&hasA?'<th>L vs A</th>':''}</tr></thead><tbody>`;
 ag.forEach(g=>{
 const cTn=(totals.byGrano[g]||0)/1000,l=totals.libros[g]||0,a=(totals.arca||{})[g]||0;
 h+=`<tr><td style="font-weight:600">${g}</td><td>${fN(cTn)}</td>`;

 if(hasL)h+=`<td>${l?diffHtml(cTn,l):''}</td>`;
 if(hasA)h+=`<td>${a?diffHtml(cTn,a):''}</td>`;
 if(hasL&&hasA)h+=`<td>${l&&a?diffHtml(l,a):''}</td>`;
 h+=`</tr>`;
 });
 h+=`</tbody></table></div></div>`;
 }
 return h;
}

function renderSummary(plantas,ptotals){
 let h='';
 const gAll={},gLib={},gAfip={};
 const hasAnyLib=plantas.some(p=>Object.values(ptotals[p.id]?.libros||{}).some(v=>v));
 const hasAnyAfip=plantas.some(p=>Object.values(ptotals[p.id]?.arca||{}).some(v=>v));
 const fN=v=>v?v.toLocaleString('es-AR',{maximumFractionDigits:0}):'';

 plantas.forEach(p=>{
 const pt=ptotals[p.id];if(!pt)return;
 Object.entries(pt.byGrano).forEach(([g,k])=>{gAll[g]=(gAll[g]||0)+k/1000;});
 Object.entries(pt.libros).forEach(([g,k])=>{if(k)gLib[g]=(gLib[g]||0)+k;});
 Object.entries(pt.arca||{}).forEach(([g,k])=>{if(k)gAfip[g]=(gAfip[g]||0)+k;});
 const gs=[...new Set([...Object.keys(pt.byGrano),...Object.keys(pt.libros),...Object.keys(pt.arca||{})])].filter(g=>g&&g!=='VACIO');
 if(!gs.length)return;
 const tcTn=Object.values(pt.byGrano).reduce((a,b)=>a+b,0)/1000;
 const tl=Object.values(pt.libros).reduce((a,b)=>a+(b||0),0);
 const ta=Object.values(pt.arca||{}).reduce((a,b)=>a+(b||0),0);
 h+=`<div class="card"><div class="row" style="flex-wrap:wrap;gap:4px"><span style="font-weight:700;flex:1">${p.nombre}</span>`;
 if(tl)h+=`<span style="font-size:11px">C-L: ${diffHtml(tcTn,tl)}</span>`;
 h+=`</div><div style="overflow-x:auto"><table style="margin-top:6px;min-width:${hasAnyAfip?'500px':'350px'}"><thead><tr><th>Cereal</th><th>Cub.</th>${hasAnyLib?'<th>Libros</th>':''}${hasAnyAfip?'<th>ARCA</th>':''}${hasAnyLib?'<th>C-L</th>':''}${hasAnyAfip?'<th>C-A</th>':''}${hasAnyLib&&hasAnyAfip?'<th>L-A</th>':''}</tr></thead><tbody>`;
 gs.forEach(g=>{
 const cTn=(pt.byGrano[g]||0)/1000,l=pt.libros[g]||0,a=(pt.arca||{})[g]||0;
 h+=`<tr><td>${g}</td><td>${fN(cTn)}</td>`;
 if(hasAnyLib)h+=`<td>${fN(l)}</td>`;
 if(hasAnyAfip)h+=`<td>${fN(a)}</td>`;
 if(hasAnyLib)h+=`<td>${l?diffHtml(cTn,l):''}</td>`;
 if(hasAnyAfip)h+=`<td>${a?diffHtml(cTn,a):''}</td>`;
 if(hasAnyLib&&hasAnyAfip)h+=`<td>${l&&a?diffHtml(l,a):''}</td>`;
 h+=`</tr>`;
 });
 h+=`</tbody></table></div></div>`;
 });

 const allG=[...new Set([...Object.keys(gAll),...Object.keys(gLib),...Object.keys(gAfip)])].filter(g=>g&&g!=='VACIO');
 if(allG.length){
 h+=`<div class="card" style="border:2px solid var(--primary);background:#f0f7ec"><span style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--primary)">Total General</span><div style="overflow-x:auto"><table style="margin-top:8px;min-width:${hasAnyAfip?'500px':'350px'}"><thead><tr><th>Cereal</th><th>Cub.</th>${hasAnyLib?'<th>Libros</th>':''}${hasAnyAfip?'<th>ARCA</th>':''}${hasAnyLib?'<th>C-L %</th>':''}${hasAnyAfip?'<th>C-A %</th>':''}${hasAnyLib&&hasAnyAfip?'<th>L-A %</th>':''}</tr></thead><tbody>`;
 allG.forEach(g=>{
 const c=gAll[g]||0,l=gLib[g]||0,a=gAfip[g]||0;
 h+=`<tr ><td style="font-weight:600">${g}</td><td>${fN(c)}</td>`;
 if(hasAnyLib)h+=`<td>${fN(l)}</td>`;
 if(hasAnyAfip)h+=`<td>${fN(a)}</td>`;
 if(hasAnyLib){const dl=c-l;h+=`<td style="font-weight:700;${dl>=0?'color:var(--success)':'color:var(--danger)'}">${l?fN(dl)+' tn ('+fPct(dl/l)+')':''}</td>`;}
 if(hasAnyAfip){const da=c-a;h+=`<td style="font-weight:700;${da>=0?'color:var(--success)':'color:var(--danger)'}">${a!=null&&a!==''?fN(da)+' tn'+(a>0?' ('+fPct(da/a)+')':''):''}</td>`;}
 if(hasAnyLib&&hasAnyAfip){const dla=l-a;h+=`<td style="font-weight:700;${dla>=0?'color:var(--success)':'color:var(--danger)'}">${l&&a?fN(dla)+' tn ('+fPct(dla/a)+')':''}</td>`;}
 h+=`</tr>`;
 });
 const tc=Object.values(gAll).reduce((a,b)=>a+b,0),tl=Object.values(gLib).reduce((a,b)=>a+b,0),ta=Object.values(gAfip).reduce((a,b)=>a+b,0);
 h+=`<tr style="border-top:2px solid var(--border)"><td style="font-weight:800">TOTAL</td><td style="font-weight:800">${fN(tc)}</td>`;
 if(hasAnyLib)h+=`<td style="font-weight:800">${fN(tl)}</td>`;
 if(hasAnyAfip)h+=`<td style="font-weight:800">${fN(ta)}</td>`;
 if(hasAnyLib){const dl=tc-tl;h+=`<td style="font-weight:800;${dl>=0?'color:var(--success)':'color:var(--danger)'}">${tl?fN(dl)+' tn ('+fPct(dl/tl)+')':''}</td>`;}
 if(hasAnyAfip){const da=tc-ta;h+=`<td style="font-weight:800;${da>=0?'color:var(--success)':'color:var(--danger)'}">${ta?fN(da)+' tn ('+fPct(da/ta)+')':''}</td>`;}
 if(hasAnyLib&&hasAnyAfip){const dla=tl-ta;h+=`<td style="font-weight:800;${dla>=0?'color:var(--success)':'color:var(--danger)'}">${tl&&ta?fN(dla)+' tn ('+fPct(dla/ta)+')':''}</td>`;}
 h+=`</tr></tbody></table></div></div>`;
 }else{

}

// Firma handlers
let _drawing=false,_lastX=0,_lastY=0;
window.initFirmaCanvas=(canvasId)=>{
 const cv=document.getElementById(canvasId);
 if(!cv||cv._init)return;cv._init=true;
 const ctx=cv.getContext('2d');
 const getPos=(e)=>{
 const r=cv.getBoundingClientRect();
 const t=e.touches?e.touches[0]:e;
 return[(t.clientX-r.left)*(cv.width/r.width),(t.clientY-r.top)*(cv.height/r.height)];
 };
 const start=(e)=>{e.preventDefault();_drawing=true;[_lastX,_lastY]=getPos(e);};
 const move=(e)=>{
 if(!_drawing)return;e.preventDefault();
 const[x,y]=getPos(e);
 ctx.beginPath();ctx.moveTo(_lastX,_lastY);ctx.lineTo(x,y);
 ctx.strokeStyle='#222';ctx.lineWidth=2;ctx.lineCap='round';ctx.stroke();
 _lastX=x;_lastY=y;
 };
 const end=()=>{_drawing=false;};
 cv.addEventListener('mousedown',start);cv.addEventListener('mousemove',move);
 cv.addEventListener('mouseup',end);cv.addEventListener('mouseleave',end);
 cv.addEventListener('touchstart',start,{passive:false});
 cv.addEventListener('touchmove',move,{passive:false});
 cv.addEventListener('touchend',end);
};

window.importarDesdeData=async function(pkg,mode){
 try{
 if(mode==='cubicaje'&&pkg.tipo==='cubicaje_completo'){
  if(pkg.config){
   const existing=S.config;
   if(pkg.cooperativa){
    const idx=existing.cooperativas.findIndex(c=>c.id===pkg.cooperativa.id);
    if(idx>=0)existing.cooperativas[idx]=pkg.cooperativa;
    else existing.cooperativas.push(pkg.cooperativa);
   }
   if(pkg.config.peConfig)existing.peConfig=pkg.config.peConfig;
   if(pkg.config.kgmConfig)existing.kgmConfig=pkg.config.kgmConfig;
   await saveCfg();
  }
  const newId=uid();
  const newSess={...pkg.session,id:newId};
  S.sessions=[newSess,...S.sessions];
  localStorage.setItem('cubicaje_sessions',JSON.stringify(S.sessions));
  localStorage.setItem('cubicaje_'+newId,JSON.stringify(pkg.data||{}));
  alert('Cubicaje importado: '+(pkg.session?.coopName||''));
  render();
 }else if(mode==='merge'){
  if(!S.activeData||!S.activeId)return alert('Primero abr\u00ed el cubicaje donde quer\u00e9s unificar');
  const incoming=pkg.data||{};
  ['entries','celdaEntries','libros','arca','plantAuditores','plantFechas','firmas'].forEach(k=>{
   if(incoming[k])Object.assign(S.activeData[k]=S.activeData[k]||{},incoming[k]);
  });
  if(incoming.silobolsas)Object.keys(incoming.silobolsas).forEach(k=>{
   S.activeData.silobolsas=S.activeData.silobolsas||{};
   S.activeData.silobolsas[k]=(S.activeData.silobolsas[k]||[]).concat(incoming.silobolsas[k]);
  });
  saveActive();alert('Datos unificados correctamente');render();
 }else{alert('Formato no reconocido');}
 }catch(e){alert('Error al importar: '+e.message);}
};
